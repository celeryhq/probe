<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{SUITE_NAME}} — AgentEval Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fb; color: #1e1e2e; }

  /* Banner */
  .banner { background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%); color: #fff; padding: 32px 40px 24px; position: relative; overflow: hidden; }
  .banner::after { content: ''; position: absolute; top: -50%; right: -10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%); }
  .banner-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .banner-brand { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
  .banner h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .banner .meta { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .banner .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 500; color: #fff; }
  .counts-row { display: flex; gap: 24px; margin-top: 16px; }
  .count-card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 20px; min-width: 100px; }
  .count-card .num { font-size: 28px; font-weight: 700; line-height: 1; }
  .count-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .count-pass .num { color: #4ade80; }
  .count-fail .num { color: #f87171; }
  .count-warn .num { color: #fbbf24; }

  /* Summary bar */
  .summary-bar { display: flex; height: 4px; }
  .summary-bar .pass { background: #4ade80; }
  .summary-bar .fail { background: #f87171; }
  .summary-bar .warn { background: #fbbf24; }

  /* Layout */
  .container { display: flex; min-height: calc(100vh - 180px); }

  /* Sidebar */
  .sidebar { width: 300px; background: #fff; border-right: 1px solid #e5e7eb; padding: 20px 0; flex-shrink: 0; overflow-y: auto; }
  .sidebar h3 { padding: 12px 20px 6px; font-size: 10px; text-transform: uppercase; color: #9ca3af; letter-spacing: 1.5px; font-weight: 600; }
  .sidebar .scenario-link { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; text-decoration: none; color: #374151; font-size: 13px; font-weight: 500; border-left: 3px solid transparent; transition: all 0.15s; }
  .sidebar .scenario-link:hover { background: #f3f4f6; }
  .sidebar .scenario-link.active { background: #f0fdf4; border-left-color: #4ade80; color: #166534; }
  .sidebar .scenario-link .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-pass { background: #4ade80; }
  .dot-fail { background: #f87171; }
  .dot-warn { background: #fbbf24; }

  /* Main content */
  .main { flex: 1; padding: 28px 36px; overflow-y: auto; max-width: 900px; }
  .scenario-detail { display: none; }
  .scenario-detail.active { display: block; }
  .scenario-detail h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #111827; }

  /* Steps */
  .steps-section { margin-bottom: 28px; }
  .steps-section h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; margin-bottom: 12px; }
  .step { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: box-shadow 0.15s; }
  .step:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .step-header { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 500; color: #374151; }
  .step-header:hover { background: #f9fafb; }
  .step-header .arrow { transition: transform 0.2s; color: #9ca3af; font-size: 11px; }
  .step-header .arrow.open { transform: rotate(90deg); }
  .step-screenshot { display: none; padding: 16px; border-top: 1px solid #e5e7eb; background: #f9fafb; }
  .step-screenshot.open { display: block; }
  .step-screenshot img { max-width: 100%; border-radius: 6px; border: 1px solid #e5e7eb; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; }

  /* Video player */
  .video-section { margin-bottom: 20px; }
  .video-section h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; margin-bottom: 12px; }
  .video-player { background: #000; border-radius: 10px; overflow: hidden; }
  .video-player video { width: 100%; display: block; border-radius: 10px; }
  .video-label { font-size: 11px; color: #9ca3af; margin-top: 6px; }

  /* Verify results */
  .verify-section { margin-bottom: 28px; }
  .verify-section h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; margin-bottom: 12px; }
  .verify-item { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 10px; transition: box-shadow 0.15s; }
  .verify-item:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .verify-item .verify-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .verify-item .verify-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; background: #f3f4f6; color: #6b7280; font-weight: 600; }
  .verify-item .verify-status { font-size: 13px; font-weight: 700; }
  .verify-item .verify-check { font-size: 13px; color: #374151; margin-bottom: 10px; font-weight: 500; }
  .verify-item .verify-explanation { font-size: 12px; color: #6b7280; padding: 10px 14px; background: #f9fafb; border-radius: 6px; line-height: 1.6; }
  .verify-item .verify-screenshot { margin-top: 12px; }
  .verify-item .verify-screenshot img { max-width: 100%; border-radius: 6px; border: 1px solid #e5e7eb; cursor: pointer; }
  .status-pass { color: #16a34a; }
  .status-fail { color: #dc2626; }
  .status-warn { color: #d97706; }

  /* AI Commentary */
  .ai-commentary { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); border: 1px solid #fde68a; border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; }
  .ai-commentary h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #92400e; margin-bottom: 10px; }
  .ai-commentary p { font-size: 13px; color: #451a03; line-height: 1.7; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; cursor: pointer; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal-overlay img { max-width: 92%; max-height: 92%; border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }

  /* Footer */
  .report-footer { text-align: center; padding: 20px; font-size: 11px; color: #9ca3af; border-top: 1px solid #e5e7eb; background: #fff; }
  .report-footer a { color: #6366f1; text-decoration: none; }

  /* Print styles */
  @media print {
    .sidebar { display: none; }
    .main { max-width: 100%; }
    .scenario-detail { display: block !important; page-break-inside: avoid; }
    .step-screenshot { display: block !important; }
  }
</style>
</head>
<body>

<div class="banner">
  <div class="banner-top">
    <div>
      <div class="banner-brand">AgentEval Report</div>
      <h1>{{SUITE_NAME}}</h1>
      <div class="meta">{{DATE}} &middot; {{TARGET_URL}}</div>
    </div>
    <div class="badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
      Automated Eval
    </div>
  </div>
  <div class="counts-row">
    <div class="count-card count-pass"><div class="num">{{PASS_COUNT}}</div><div class="label">Passed</div></div>
    <div class="count-card count-fail"><div class="num">{{FAIL_COUNT}}</div><div class="label">Failed</div></div>
    <div class="count-card count-warn"><div class="num">{{WARN_COUNT}}</div><div class="label">Warnings</div></div>
  </div>
</div>
<div class="summary-bar">
  <div class="pass" style="width: {{PASS_PCT}}%"></div>
  <div class="fail" style="width: {{FAIL_PCT}}%"></div>
  <div class="warn" style="width: {{WARN_PCT}}%"></div>
</div>

<div class="container">
  <div class="sidebar">
    {{FUNCTIONAL_SIDEBAR_ITEMS}}
    {{COMPLIANCE_SIDEBAR_ITEMS}}
  </div>
  <div class="main">
    {{SCENARIO_DETAILS}}
  </div>
</div>

<div class="report-footer">
  Generated by <a href="#">AgentEval</a> &middot; AI-powered end-to-end testing for AI agents
</div>

<div class="modal-overlay" id="imageModal">
  <img id="modalImage" src="" alt="Full size screenshot">
</div>

<script>
document.querySelectorAll('.scenario-link').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.scenario-link').forEach(l => l.classList.remove('active'));
    document.querySelectorAll('.scenario-detail').forEach(d => d.classList.remove('active'));
    link.classList.add('active');
    document.getElementById(link.dataset.target).classList.add('active');
  });
});

document.querySelectorAll('.step-header').forEach(header => {
  header.addEventListener('click', () => {
    const arrow = header.querySelector('.arrow');
    const screenshot = header.nextElementSibling;
    arrow.classList.toggle('open');
    screenshot.classList.toggle('open');
  });
});

document.querySelectorAll('.verify-screenshot img, .step-screenshot img').forEach(img => {
  img.addEventListener('click', e => {
    e.stopPropagation();
    const modal = document.getElementById('imageModal');
    document.getElementById('modalImage').src = img.src;
    modal.classList.add('open');
  });
});

document.getElementById('imageModal').addEventListener('click', () => {
  document.getElementById('imageModal').classList.remove('open');
});

const firstLink = document.querySelector('.scenario-link');
if (firstLink) firstLink.click();
</script>

</body>
</html>
