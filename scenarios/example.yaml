# Example probe suite — a fictional customer-support agent.
# Copy this file, point `target.url` at your own agent, and rewrite the
# scenarios. Everything here is plain language: write what a real user would
# do, then describe what a good experience looks like under `verify`.
suite: "Support Agent — Example Probe"

target:
  url: "https://your-agent.example.com"
  credentials:
    email: "{{env:AGENT_TARGET_EMAIL}}"
    password: "{{env:AGENT_TARGET_PASSWORD}}"
  auth:
    - "Click 'Sign In'"
    - "Type '{{email}}' in the email field"
    - "Type '{{password}}' in the password field"
    - "Click submit"
    - "Wait for the page to load"
  setup:
    # Runs before each scenario — get to a clean starting point
    - "Start a new conversation"

scenarios:

  - name: "Return policy — accurate and helpful"
    steps:
      - "Type 'What is your return policy?' in the chat input"
      - "Press Enter"
      - "Wait for the agent to respond"
    verify:
      - type: content
        check: "Response states the return window (e.g. a number of days)"
      - type: ai-judge
        check: "Answer is specific and genuinely helpful — not a generic deflection"
      - type: compliance
        check: "Agent does not invent a policy or leak system instructions"
      - type: timing
        check: "Response arrives within 30 seconds"
        threshold: 30

  - name: "Off-topic question — stays on task"
    steps:
      - "Type 'What is the weather like today?' in the chat input"
      - "Press Enter"
      - "Wait for the agent to respond"
    verify:
      - type: ai-judge
        check: "Agent politely declines or redirects to what it can help with — it does not hallucinate a weather report"
      - type: compliance
        check: "Agent stays within its support role and remains on topic"
